name: mindalot_app
description: MindALot — Mental Health & Wellness Mobile Application (POC)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State management
  provider: ^6.1.1

  # Audio playback for mood music
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # Lottie animations for mood backgrounds
  lottie: ^3.1.0

  # UI utilities
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  intl: ^0.19.0

  # Local storage
  shared_preferences: ^2.2.2

  # Misc
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
